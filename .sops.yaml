# sops-nix key configuration
# ──────────────────────────────────────────────────────────
#
# SETUP (run once per machine):
#
# 1. Get the age public key from each host's SSH key:
#    nix-shell -p ssh-to-age --run \
#      "ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub"
#
# 2. Get your personal age key (for local editing):
#    nix-shell -p age --run "age-keygen"
#    Store the private key at: ~/.config/sops/age/keys.txt
#
# 3. Replace the placeholder age1... values below with real keys.
#
# 4. Create secrets:
#    sops secrets/nas.yaml
#
# Key: sops always needs ALL listed keys to decrypt.
# Both the host key (for nixos-rebuild) and your personal key (for editing) are included.

keys:
  - &homelab  age1REPLACE_WITH_HOMELAB_HOST_AGE_KEY
  - &antonio  age1REPLACE_WITH_YOUR_PERSONAL_AGE_KEY

creation_rules:
  - path_regex: secrets/nas\.yaml$
    key_groups:
      - age:
          - *homelab
          - *antonio
